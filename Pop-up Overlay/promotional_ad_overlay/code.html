        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface antialiased">
<!-- Background Content (Simulated Dashboard) -->
<main class="min-h-screen p-8 opacity-40 pointer-events-none overflow-hidden">
<header class="flex justify-between items-center mb-12">
<div class="h-8 w-32 bg-surface-container-highest rounded-full"></div>
<div class="flex space-x-4">
<div class="h-8 w-8 bg-surface-container-highest rounded-full"></div>
<div class="h-8 w-8 bg-surface-container-highest rounded-full"></div>
</div>
</header>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="h-64 bg-surface-container-low rounded-xl"></div>
<div class="h-64 bg-surface-container-low rounded-xl"></div>
<div class="h-64 bg-surface-container-low rounded-xl"></div>
<div class="md:col-span-2 h-96 bg-surface-container-low rounded-xl"></div>
<div class="h-96 bg-surface-container-low rounded-xl"></div>
</div>
</main>
<!-- Overlay Component -->
<div class="fixed inset-0 z-[60] flex items-center justify-center p-4 sm:p-6 lg:p-8">
<!-- Backdrop -->
<div class="absolute inset-0 bg-on-surface/20 backdrop-blur-md"></div>
<!-- Modal Content -->
<div class="relative w-full max-w-4xl bg-surface-container-lowest rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[500px]">
<!-- Left Side: Image Content -->
<div class="relative w-full md:w-1/2 h-64 md:h-auto overflow-hidden">
<img alt="Premium minimalist product showcase" class="absolute inset-0 w-full h-full object-cover" data-alt="Minimalist white premium smartwatch on a clean background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBOlqNp4IK3LZGwz0dInOC16bCPVRN7VDossZDVhqRoBPaoOTTCRzJ2kneovkv2PzQTAJLCDeNx0FPZFzlOTPQAZCN-ts5JlK6THD3cpFCEzNJ1O2sbEEaV_f65a4wlKRdQ6XCvahftSPXCNL1AUn16XuLY6m2JprFTNfHmfazg5TPkVBN4JElDtY33B4CV7bzQzFxnkmGql3S8gQGKZ-dbHcmOu168giNKsxYbJACqdm5_EM3zJYNJKeONDsDVLseTLb1qOquuEyY"/>
<!-- Decorative Gradient Overlay on Image -->
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
<div class="absolute bottom-6 left-6">
<span class="bg-secondary-container text-on-secondary-container text-[10px] font-bold tracking-widest px-3 py-1 rounded-full uppercase mb-2 inline-block">New Arrival</span>
</div>
</div>
<!-- Right Side: Offer Details -->
<div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
<!-- Close Button (TopAppBar Trailing Icon Logic) -->
<button class="absolute top-6 right-6 p-2 rounded-full text-outline hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<!-- Brand Header (TopAppBar Headline logic) -->
<div class="mb-8">
<h2 class="font-headline text-primary font-extrabold text-sm tracking-widest uppercase mb-2">Exclusive Access</h2>
<h1 class="font-headline text-on-surface text-4xl md:text-5xl font-extrabold leading-tight tracking-tight">
                    Exclusive Deal: <span class="text-primary">20% Off</span>
</h1>
</div>
<p class="text-on-surface-variant font-body text-lg mb-8 leading-relaxed">
                    Elevate your daily routine with our premium collection. Limited quantities available for this seasonal window.
                </p>
<!-- Countdown Timer Section (Asymmetric Grid) -->
<div class="flex items-center gap-4 mb-10">
<div class="flex flex-col items-center justify-center bg-surface-container-low w-16 h-16 rounded-2xl">
<span class="font-headline font-bold text-2xl text-on-surface">02</span>
<span class="font-label text-[10px] uppercase text-outline">Hrs</span>
</div>
<span class="font-bold text-on-surface-variant">:</span>
<div class="flex flex-col items-center justify-center bg-surface-container-low w-16 h-16 rounded-2xl">
<span class="font-headline font-bold text-2xl text-on-surface">45</span>
<span class="font-label text-[10px] uppercase text-outline">Min</span>
</div>
<span class="font-bold text-on-surface-variant">:</span>
<div class="flex flex-col items-center justify-center bg-surface-container-low w-16 h-16 rounded-2xl">
<span class="font-headline font-bold text-2xl text-on-surface">12</span>
<span class="font-label text-[10px] uppercase text-outline">Sec</span>
</div>
<div class="ml-auto hidden sm:block">
<span class="font-label text-xs font-semibold text-secondary flex items-center gap-1">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">timer</span>
                            Expires Soon
                        </span>
</div>
</div>
<!-- CTA Button -->
<button class="w-full py-5 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-full shadow-lg shadow-primary/20 transition-all hover:translate-y-[-2px] active:scale-95 flex items-center justify-center gap-2 group">
                    Shop Now
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<p class="mt-6 text-center text-outline text-xs font-medium uppercase tracking-widest">
                    Free shipping on orders over $150
                </p>
</div>
</div>
</div>
<!-- Bottom Navigation Bar (Hidden on Desktop, following JSON pattern) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-white/80 backdrop-blur-xl rounded-t-[2rem] shadow-[0_-12px_40px_rgba(23,28,31,0.06)]">

<span class="material-symbols-outlined">home</span>
<span class="font-inter text-xs font-medium uppercase tracking-widest mt-1">Home</span>
</a>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">sell</span>
<span class="font-inter text-xs font-medium uppercase tracking-widest mt-1">Offers</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 px-5 py-2" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-inter text-xs font-medium uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
