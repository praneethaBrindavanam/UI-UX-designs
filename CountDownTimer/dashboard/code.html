<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kitchen Timer Dashboard</title>
<!-- BEGIN: Tailwind CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: Tailwind CDN -->
<!-- BEGIN: Custom Configuration -->
<script data-purpose="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            app: {
              orange: '#FF8C42',
              green: '#84A98C',
              cream: '#FFF9F5',
              dark: '#2F3E46'
            }
          }
        }
      }
    }
  </script>
<!-- END: Custom Configuration -->
<style data-purpose="custom-animations">
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    .animate-pulse-slow {
      animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
</head>
<body class="bg-app-cream min-h-screen text-app-dark font-sans pb-24">
<!-- BEGIN: Header -->
<header class="p-6 flex justify-between items-center" data-purpose="main-header">
<div>
<h1 class="text-2xl font-bold text-app-orange">ChefTime</h1>
<p class="text-sm text-gray-500">Your kitchen is ready</p>
</div>
<div class="w-10 h-10 rounded-full bg-app-green flex items-center justify-center text-white shadow-sm">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</header>
<!-- END: Header -->
<!-- BEGIN: MainContent -->
<main class="px-6 space-y-8">
<!-- BEGIN: CurrentTimersSection -->
<section data-purpose="active-timers">
<div class="flex justify-between items-center mb-4">
<h2 class="text-lg font-semibold">Current Timers</h2>
<span class="text-xs font-medium text-app-orange bg-orange-100 px-2 py-1 rounded-full">2 Active</span>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Timer Card 1 -->
<div class="bg-white p-4 rounded-3xl shadow-sm border border-orange-50 flex flex-col items-center space-y-3" data-purpose="timer-card">
<div class="relative w-24 h-24">
<!-- Circular Progress SVG -->
<svg class="w-full h-full transform -rotate-90">
<circle class="text-gray-100" cx="48" cy="48" fill="transparent" r="40" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-app-orange" cx="48" cy="48" fill="transparent" r="40" stroke="currentColor" stroke-dasharray="251.2" stroke-dashoffset="62.8" stroke-width="6"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="text-lg font-bold">04:30</span>
</div>
</div>
<p class="text-sm font-medium">Pasta</p>
<button class="text-xs text-gray-400 hover:text-red-500 transition-colors">Cancel</button>
</div>
<!-- Timer Card 2 -->
<div class="bg-white p-4 rounded-3xl shadow-sm border border-green-50 flex flex-col items-center space-y-3" data-purpose="timer-card">
<div class="relative w-24 h-24">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-gray-100" cx="48" cy="48" fill="transparent" r="40" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-app-green" cx="48" cy="48" fill="transparent" r="40" stroke="currentColor" stroke-dasharray="251.2" stroke-dashoffset="180" stroke-width="6"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="text-lg font-bold">02:15</span>
</div>
</div>
<p class="text-sm font-medium">Soft Egg</p>
<button class="text-xs text-gray-400 hover:text-red-500 transition-colors">Cancel</button>
</div>
</div>
</section>
<!-- END: CurrentTimersSection -->
<!-- BEGIN: QuickStartSection -->
<section data-purpose="presets-grid">
<h2 class="text-lg font-semibold mb-4">Quick Start</h2>
<div class="space-y-3">
<!-- Preset Item: Soft Boiled Egg -->
<div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between group active:scale-95 transition-transform" data-purpose="preset-item">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-xl bg-orange-50 flex items-center justify-center text-app-orange">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<h3 class="font-medium text-gray-800">Soft Boiled Egg</h3>
<p class="text-xs text-gray-400">Perfectly runny center</p>
</div>
</div>
<span class="text-app-orange font-bold">6m</span>
</div>
<!-- Preset Item: Pasta -->
<div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between group active:scale-95 transition-transform" data-purpose="preset-item">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center text-app-green">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 6h16M4 12h16M4 18h7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<h3 class="font-medium text-gray-800">Pasta</h3>
<p class="text-xs text-gray-400">Al dente perfection</p>
</div>
</div>
<span class="text-app-green font-bold">9m</span>
</div>
<!-- Preset Item: Tea -->
<div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between group active:scale-95 transition-transform" data-purpose="preset-item">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center text-blue-400">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<h3 class="font-medium text-gray-800">Tea</h3>
<p class="text-xs text-gray-400">Steeped to relax</p>
</div>
</div>
<span class="text-blue-500 font-bold">3m</span>
</div>
<!-- Preset Item: Roast Chicken -->
<div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between group active:scale-95 transition-transform" data-purpose="preset-item">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-xl bg-red-50 flex items-center justify-center text-red-400">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.99 7.99 0 0120 13a7.98 7.98 0 01-2.343 5.657z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<h3 class="font-medium text-gray-800">Roast Chicken</h3>
<p class="text-xs text-gray-400">Golden &amp; juicy</p>
</div>
</div>
<span class="text-red-500 font-bold text-right">1h 30m</span>
</div>
</div>
</section>
<!-- END: QuickStartSection -->
</main>
<!-- END: MainContent -->
<!-- BEGIN: FloatingActionButton -->
<div class="fixed bottom-8 right-6" data-purpose="action-layer">
<button class="w-16 h-16 bg-app-orange text-white rounded-full shadow-lg shadow-orange-200 flex items-center justify-center hover:scale-110 active:scale-95 transition-all focus:outline-none focus:ring-4 focus:ring-orange-200" id="add-timer-btn">
<svg class="h-8 w-8" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
</button>
</div>
<!-- END: FloatingActionButton -->
<!-- BEGIN: BottomNav (Simulated iOS Bar) -->
<nav class="fixed bottom-0 w-full bg-white/80 backdrop-blur-md border-t border-gray-100 flex justify-around items-center py-3 pb-6" data-purpose="bottom-navigation">
<button class="flex flex-col items-center space-y-1 text-app-orange">
<svg class="h-6 w-6" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 13h1v7c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-7h1a1 1 0 00.707-1.707l-9-9a.999.999 0 00-1.414 0l-9 9A1 1 0 003 13zm7 7v-5h4v5h-4z"></path>
</svg>
<span class="text-[10px] font-bold">Timers</span>
</button>
<button class="flex flex-col items-center space-y-1 text-gray-400 hover:text-app-orange transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">Recipes</span>
</button>
<button class="flex flex-col items-center space-y-1 text-gray-400 hover:text-app-orange transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">Settings</span>
</button>
</nav>
<!-- END: BottomNav -->
<script data-purpose="interaction-logic">
    // Simple visual feedback for preset buttons
    document.querySelectorAll('[data-purpose="preset-item"]').forEach(button => {
      button.addEventListener('click', () => {
        const title = button.querySelector('h3').innerText;
        console.log(`Starting timer for: ${title}`);
        // Visual cue
        button.classList.add('bg-orange-50');
        setTimeout(() => button.classList.remove('bg-orange-50'), 200);
      });
    });

    // Add timer button interaction
    document.getElementById('add-timer-btn').addEventListener('click', () => {
      alert('Open New Timer Modal');
    });
  </script>
</body></html>
